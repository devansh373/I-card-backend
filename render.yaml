services:
  - type: web
    name: i-card-print-backend
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: i-card-print-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        placeholder: "Admin email for initial setup"
      - key: ADMIN_PASSWORD
        placeholder: "Strong admin password for initial setup"
      - key: ALLOWED_ORIGINS
        value: "*" # Update this to your frontend URL in production
      - key: IMAGEKIT_PUBLIC_KEY
        placeholder: "Optional: Your ImageKit public key"
      - key: IMAGEKIT_PRIVATE_KEY
        placeholder: "Optional: Your ImageKit private key"
      - key: IMAGEKIT_URL_ENDPOINT
        placeholder: "Optional: Your ImageKit URL endpoint"
      - key: RESEND_API_KEY
        placeholder: "Optional: Your Resend API key for emails"

databases:
  - name: i-card-print-db
    plan: free
    databaseName: icardprint
    user: icarduser
