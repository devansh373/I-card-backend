version: "3.9"

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: school-id-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${DEV_POSTGRES_DB:-school_id_dev}
    ports:
      - "${DEV_HOST_POSTGRES_PORT:-5439}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: school-id-backend-dev
    restart: always
    ports:
      - "${DEV_HOST_BACKEND_PORT:-5055}:5000"
    environment:
      # Database (override for dev with postgres-dev service)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-dev:5432/${DEV_POSTGRES_DB:-school_id_dev}
      # Server
      PORT: ${PORT:-5000}
      NODE_ENV: development
      # Authentication
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-key}
      # Admin Credentials
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vendor.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # ImageKit
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY:-}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY:-}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT:-}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      postgres-dev:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules # Anonymous volume to prevent host node_modules from overwriting container's

volumes:
  postgres_data_dev:
